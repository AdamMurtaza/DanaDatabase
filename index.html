
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dana Committee — Taheri Mohallah</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:            #121212;
      --bg-raised:     #181818;
      --surface:       #1e1e1e;
      --surface-hi:    #252525;
      --surface-deep:  #161616;
      --green:         #2d7a4f;
      --green-hi:      #35915d;
      --green-lo:      #1f5537;
      --green-muted:   #1a3d2b;
      --green-text:    #5bbf87;
      --green-ghost:   rgba(45,122,79,0.15);
      --text-primary:  #e8e8e8;
      --text-secondary:#9a9a9a;
      --text-muted:    #5a5a5a;
      --danger:        #c0392b;
      --danger-muted:  rgba(192,57,43,0.15);
      --clay-raise:
        6px 6px 14px rgba(0,0,0,0.55),
        -3px -3px 8px rgba(255,255,255,0.04);
      --clay-raise-sm:
        4px 4px 10px rgba(0,0,0,0.5),
        -2px -2px 6px rgba(255,255,255,0.035);
      --clay-sink:
        inset 4px 4px 10px rgba(0,0,0,0.6),
        inset -2px -2px 6px rgba(255,255,255,0.03);
      --clay-sink-deep:
        inset 5px 5px 14px rgba(0,0,0,0.7),
        inset -3px -3px 8px rgba(255,255,255,0.025);
      --clay-green:
        6px 6px 14px rgba(0,0,0,0.55),
        -3px -3px 8px rgba(255,255,255,0.04),
        0 0 0 1px rgba(45,122,79,0.25);
      --font:       'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --r-sm:  12px;
      --r-md:  18px;
      --r-lg:  22px;
      --r-xl:  28px;
      --ease-clay: cubic-bezier(0.34, 1.40, 0.64, 1);
      --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);
      --t:         0.22s;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.025;
      background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E\");
      pointer-events: none;
      z-index: 9999;
    }
    .header {
      background: var(--surface);
      box-shadow: var(--clay-raise);
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      padding: 22px 24px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      font-family: var(--font-serif);
      font-size: clamp(17px, 5vw, 21px);
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--green-text);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-top: 4px;
      opacity: 0.8;
    }
    .header-pip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green-ghost);
      border: 1px solid rgba(45,122,79,0.3);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      color: var(--green-text);
      letter-spacing: 0.1em;
      margin-top: 10px;
    }
    .pip-dot {
      width: 5px;
      height: 5px;
      background: var(--green-text);
      border-radius: 50%;
      animation: breathe 2.2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.6); }
    }
    .app {
      max-width: 460px;
      margin: 0 auto;
      padding: 28px 18px 56px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      padding-left: 4px;
    }
    .clay-card {
      background: var(--surface);
      border-radius: var(--r-xl);
      box-shadow: var(--clay-raise);
      padding: 22px 20px;
      margin-bottom: 16px;
    }
    .menu-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
      padding: 19px 20px;
      background: var(--surface);
      border: none;
      border-radius: var(--r-xl);
      box-shadow: var(--clay-raise);
      cursor: pointer;
      transition: box-shadow var(--t) var(--ease-clay), transform var(--t) var(--ease-clay);
      margin-bottom: 14px;
      text-align: left;
    }
    .menu-btn:active {
      box-shadow: var(--clay-sink);
      transform: scale(0.975);
    }
    .menu-icon-wrap {
      width: 50px;
      height: 50px;
      flex-shrink: 0;
      border-radius: var(--r-md);
      background: linear-gradient(145deg, var(--green-hi), var(--green-lo));
      box-shadow: 3px 3px 8px rgba(0,0,0,0.45), -1px -1px 4px rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .menu-text-main { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .menu-text-sub { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
    .clay-input {
      width: 100%;
      padding: 17px 18px;
      font-family: var(--font);
      font-size: 16px;
      color: var(--text-primary);
      background: var(--surface-deep);
      border: none;
      border-radius: var(--r-lg);
      box-shadow: var(--clay-sink);
      outline: none;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      width: 100%;
      padding: 17px 20px;
      border: none;
      border-radius: var(--r-lg);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(155deg, var(--green-hi) 0%, var(--green-lo) 100%);
      color: #fff;
      box-shadow: var(--clay-green);
    }
    .item-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 296px;
      overflow-y: auto;
      margin-bottom: 18px;
    }
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }
    .loading-overlay.show { opacity: 1; pointer-events: all; }
    .section { animation: section-rise 0.32s var(--ease-clay) both; }
    @keyframes section-rise {
      from { opacity: 0; transform: translateY(18px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class=\"header\">
    <div class=\"header-title\">Dana Committee</div>
    <div class=\"header-sub\">Taheri Mohallah</div>
  </div>
  <div class=\"app\">
    <div id=\"menu-section\" class=\"section\">
      <div class=\"section-label\">Select Module</div>
      <button class=\"menu-btn\" onclick=\"showDateInput('Attendance', 'Member name')\">
        <span class=\"menu-icon-wrap\">📅</span>
        <span class=\"menu-text\">
          <div class=\"menu-text-main\">Attendance</div>
          <div class=\"menu-text-sub\">Record member presence by date</div>
        </span>
      </button>
    </div>
    <div id=\"date-section\" class=\"section hidden\">
      <div class=\"clay-card\">
        <input type=\"date\" id=\"date-input\" class=\"clay-input\" />
        <button class=\"btn btn-primary\" onclick=\"processDate()\">Continue</button>
      </div>
    </div>
  </div>
  <script>
    function showSection(id) {
        ['menu-section', 'date-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
    function showDateInput(tab) {
        showSection('date-section');
    }
    function processDate() {
        alert('System active');
    }
  </script>
</body>
</html>
